<DOCTYPE! html>
<html>
<head>
<title> CATtoustic login </title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Convergence&display=swap');

	body {
	background: linear-gradient(#e6c5f0, #b983c9);
	}
.HEAD{
	border: 1px solid black;
	width: 100%;
	height: 300;
}

.RRIGHT {

	width: 44%;
	height: 500px;
	float: left;
	margin-top: 20px;
	background-color: black;
}

.glowing-box {
  border-radius: 10px; 
  margin-top: 20px;
  margin-left: 30px;

  float: left;
  height: 500px;
  width: 45%;
  padding: 1rem;
  background-color: #FF9A47; 
  color: white;
  box-shadow: 0 0 10px black, 0 0 20px black; 
  transition: box-shadow 0.5s ease-in-out; 
}

.glowing-box:hover {
  box-shadow: 0 0 30px #b46bc9, 0 0 50px #b46bc9; 
}
	.mySwiper{
		max-width: 1200px;
		margin: 0 auto;
	}
	
.form {
		margin: 0; 
		padding: 0; 
		box-sizing: 
		border-box; 
		font-family: 'Convergence', sans-serif;
		position: relative;
		width: 20rem;
	}
.form_input {
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		border: 2px solid gray;
		border-radius: 0.3rem;
	}
	a {
	text-decoration: none;
	}
	
.login-btn	{
	background-color: #BC94C9;
	padding: 8px 30px;
	text-align: center;
	display: inline-block;
	font-size: 20px;
	cursor: pointer;
	border: 2px solid #854899;
	border-radius: 15px;
	transition: background-color 1;
	font-family: Convergence;
	font-weight: bold;
}

.login-btn:hover {
	background-color: #b983c9;
	box-shadow: 0 0 10px #b46bc9, 0 0 20px #b46bc9; 
}

	
</style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

</head>
<body>

	<div class = "HEAD" style="background-color: #afc4b2;"> 
	
	<img src = "CATtoustic.png" width = "100%" height = "300px"> 
	
	</div>
	
	<div class = "glowing-box">
		  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
	
		<div class="swiper-slide">
			<img src= "MS1.png" style = "width: 100%; max-height: 1000px; object-fit: cover;">
		</div>
	  
		<div class="swiper-slide">
			<img src= "MS2.png" style = "width: 100%; max-height: 1000px; object-fit: cover;">
		</div>
	
		<div class="swiper-slide">	  
			<img src= "p3.png" style = "width: 100%; max-height: 1000px; object-fit: cover;">
		</div>

    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>

 <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

 <!-- Initialize Swiper -->
  <script>
    var swiper = new Swiper(".mySwiper", {
      spaceBetween: 30,
      centeredSlides: true,
      autoplay: {
        delay: 2500,
        disableOnInteraction: false,
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
  </script>
	</div>

	<div style = "border: 1px solid black; height: 500px; width: 25%; float: right; margin-top:35px; margin-right:250px; background-color: #FF9A47; border-radius: 10%;">
		
		<center>
		<div><img src = "HICON4.png" height = "250px" width = "320px"></div>
			<form>
				<div class= "form">
					<label for="email"
					class="form_label">Email</label>	
					<br>
					<input type="text" id="email"
					class="form_input"
					autocomplete="off">
				</div>
				<br>
				<div class= "form">
					<label for="password"
					class="form_label">Password</label>
					<br>
					<input type="password" id="password"
					class="form_input"
					autocomplete="off">
				</div>
				
				<input type="checkbox" id="rememberme" name="remember" value="remembering">
				<label for="rememberme">Remember me?</label>
				    <a href="#" style = "float: right; margin-right: 70px; font-family: Convergence;">Forgot Password?</a>
				<br>	
				<br>
                <a href = "home.html" class="login-btn">Sign In</a>
                
                <div class="footer-links">
                    <div class="divider"></div>
                    <span style = "font-family: Convergence;">No account? <a href="#" class="signup">Join the Tunes!</a></span>
                </div>
            </form>
		</center>
		
	</div>

</body>

</html>
